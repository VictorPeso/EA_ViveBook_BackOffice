<section class="libros-list">
  <div class="libros-list__header">
    <div>
      <p class="libros-list__eyebrow">Administración</p>
      <h2 class="libros-list__title">Usuarios</h2>
      <p class="libros-list__subtitle">Gestiona los usuarios y sus libros asignados.</p>
    </div>

    <button type="button" class="libros-list__create-button" (click)="onCreateNew()">
      + Añadir nuevo
    </button>
  </div>

  <div class="libros-list__body">
    <div *ngIf="isLoading" class="libros-list__state">Cargando usuarios...</div>
    <div *ngIf="!isLoading && usuarios.length === 0" class="libros-list__state">No hay usuarios disponibles.</div>

    <ul *ngIf="!isLoading && usuarios.length > 0" class="libros-list__items">
      <li *ngFor="let u of usuarios; trackBy: trackByUsuarioId" class="libros-list__item">
        <button type="button" class="libros-list__card" [class.active]="isSelected(u)" (click)="onSelect(u)">
          <div class="libros-list__card-top">
            <h3 class="libros-list__card-title">{{ u.name || 'Sin nombre' }}</h3>
            <span class="libros-list__badge">
              {{ getLibrosCount(u) }} libro{{ getLibrosCount(u) === 1 ? '' : 's' }}
            </span>
          </div>
          <p class="libros-list__meta"><strong>Email:</strong> {{ u.email }}</p>
        </button>
      </li>
    </ul>
  </div>
</section>
